<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#221A12">
<link rel="manifest" href="/static/manifest.json">
<link rel="icon" href="/static/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600&family=Bitter:wght@600;700&display=swap" rel="stylesheet">
<title>AH.knockblock — Log in</title>
<style>
  :root {
    color-scheme: dark;
    --bg: #221A12;
    --raised: #2A2117;
    --line: #3A2E20;
    --edge: #57543E;
    --tan: #C9B48F;
    --tan-bright: #DECBA6;
    --orange: #E85D26;
    --ink: #EFE7D6;
    --ink-soft: #A08A66;
    --ink-faint: #7A6A50;
    --font-display: 'Bitter', Georgia, serif;
    --font-body: 'Barlow', -apple-system, sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 24px;
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--ink);
  }
  .card {
    width: 100%;
    max-width: 360px;
    background: var(--raised);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 24px;
    display: grid;
    gap: 20px;
  }
  .wordmark {
    display: flex;
    align-items: baseline;
    justify-content: center;
    gap: 10px;
    margin: 0;
    font: 600 20px var(--font-display);
    letter-spacing: 0.01em;
    color: var(--ink);
  }
  .wordmark .ah { font-weight: 700; color: var(--tan); }
  form { display: grid; gap: 10px; margin: 0; }
  input[type="password"] {
    width: 100%;
    padding: 12px;
    font: 400 16px var(--font-body);
    color: var(--ink);
    background: var(--bg);
    border: 1px solid var(--edge);
    border-radius: 4px;
  }
  input[type="password"]::placeholder { color: var(--ink-faint); }
  input[type="password"]:focus { outline: 1px solid var(--tan); outline-offset: -1px; }
  button {
    padding: 12px;
    font: 600 15px var(--font-body);
    color: var(--bg);
    background: var(--tan);
    border: none;
    border-radius: 4px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  button:active { background: var(--tan-bright); }
  .error {
    margin: 0;
    text-align: center;
    font: 500 13px var(--font-body);
    color: var(--orange);
  }
  .setup { font-size: 14px; color: var(--ink-soft); line-height: 1.5; margin: 0; }
  .demo-link {
    text-align: center;
    font: 400 12px var(--font-body);
    color: var(--ink-soft);
    text-decoration: none;
  }
  .demo-link:active { color: var(--ink); }
  pre {
    margin: 0;
    padding: 12px;
    font-size: 12px;
    color: var(--ink-soft);
    background: var(--bg);
    border: 1px solid var(--edge);
    border-radius: 4px;
    overflow-x: auto;
  }
  .footnote {
    font: 400 11px var(--font-body);
    letter-spacing: 0.1em;
    color: var(--ink-faint);
  }
</style>
</head>
<body>
  <div class="card">
    <h1 class="wordmark"><span class="ah">AH.</span><span>Knockblock</span></h1>
    {% if setup_needed %}
    <p class="setup">No password has been set yet. On the Pi, run:</p>
    <pre>sudo ./venv/bin/python3 app.py --set-password</pre>
    <p class="setup">then reload this page.</p>
    {% else %}
    <form method="post">
      <input type="password" name="password" placeholder="Password" autofocus
             autocomplete="current-password" required>
      <button type="submit">Unlock</button>
      {% if error %}<p class="error">{{ error }}</p>{% endif %}
    </form>
    {% endif %}
    <a class="demo-link" href="/demo">Just browsing? Watch the live demo →</a>
  </div>
  <span class="footnote">PRACTICAL OVER DECORATIVE</span>
</body>
</html>
