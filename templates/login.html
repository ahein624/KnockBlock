<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0e0f13">
<link rel="manifest" href="/static/manifest.json">
<link rel="icon" href="/static/icon-192.png">
<title>AH.knockblock — Log in</title>
<style>
  :root {
    color-scheme: dark;
    --bg: #0a0b0f;
    --card: rgba(255, 255, 255, 0.05);
    --card-border: rgba(255, 255, 255, 0.08);
    --ink: #f2f2f7;
    --ink-dim: #8f8f9b;
    --accent: #3b82f6;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: radial-gradient(140% 100% at 50% -20%, #161b29 0%, var(--bg) 60%) fixed;
    color: var(--ink);
  }
  .card {
    width: 100%;
    max-width: 360px;
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 24px;
    padding: 28px 24px;
    display: grid;
    gap: 16px;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    box-shadow: 0 18px 50px rgba(0, 0, 0, 0.4);
    animation: rise 0.5s cubic-bezier(0.2, 1.1, 0.3, 1) backwards;
  }
  @keyframes rise { from { opacity: 0; transform: translateY(14px); } }
  .wordmark {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-size: 1.35rem;
    font-weight: 800;
    letter-spacing: -0.02em;
    margin: 0;
    color: var(--ink);
  }
  .wordmark .ah {
    padding: 5px 8px;
    font-size: 1.05rem;
    font-weight: 900;
    color: #fff;
    background: linear-gradient(135deg, #30a46c, #3b82f6 55%, #8e4ec6);
    border-radius: 10px;
    box-shadow: 0 2px 10px rgba(59, 130, 246, 0.35);
  }
  form { display: grid; gap: 12px; margin: 0; }
  input[type="password"] {
    width: 100%;
    padding: 14px 16px;
    font-size: 1rem;
    color: var(--ink);
    background: rgba(0, 0, 0, 0.32);
    border: 1px solid var(--card-border);
    border-radius: 14px;
  }
  input[type="password"]:focus { outline: 2px solid var(--accent); border-color: transparent; }
  button {
    padding: 14px;
    font-size: 0.95rem;
    font-weight: 700;
    color: #fff;
    background: var(--accent);
    border: none;
    border-radius: 14px;
    box-shadow: 0 4px 16px rgba(59, 130, 246, 0.35);
    -webkit-tap-highlight-color: transparent;
    transition: transform 0.25s cubic-bezier(0.2, 1.1, 0.3, 1);
  }
  button:active { transform: scale(0.96); }
  .error {
    margin: 0;
    text-align: center;
    font-size: 0.88rem;
    font-weight: 650;
    color: #f26d75;
  }
  .setup { font-size: 0.9rem; color: var(--ink-dim); line-height: 1.5; margin: 0; }
  pre {
    margin: 0;
    padding: 12px;
    font-size: 0.78rem;
    background: var(--bg);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    overflow-x: auto;
  }
</style>
</head>
<body>
  <div class="card">
    <h1 class="wordmark"><span class="ah">AH.</span><span>knockblock</span></h1>
    {% if setup_needed %}
    <p class="setup">No password has been set yet. On the Pi, run:</p>
    <pre>sudo ./venv/bin/python3 app.py --set-password</pre>
    <p class="setup">then reload this page.</p>
    {% else %}
    <form method="post">
      <input type="password" name="password" placeholder="Password" autofocus
             autocomplete="current-password" required>
      <button type="submit">Unlock</button>
      {% if error %}<p class="error">{{ error }}</p>{% endif %}
    </form>
    {% endif %}
  </div>
</body>
</html>
