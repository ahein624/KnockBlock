<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#191710">
<link rel="manifest" href="/static/manifest.json">
<link rel="icon" href="/static/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@600;700&family=Barlow:wght@400;500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<title>AH.knockblock — Log in</title>
<style>
  /* AH Field System — the one hi-vis orange on this view is the UNLOCK ripcord. */
  :root {
    color-scheme: dark;
    --coyote: #B3A180;
    --canvas: #191710;
    --canvas-raised: #211E14;
    --olive: #57543E;
    --hivis: #FF5C1C;
    --line: #35301F;
    --ink: #E4DDC9;
    --ink-soft: #9C9480;
    --ink-faint: #6B6350;
    --font-display: 'Barlow Semi Condensed', -apple-system, sans-serif;
    --font-body: 'Barlow', -apple-system, sans-serif;
    --font-mono: 'IBM Plex Mono', ui-monospace, SFMono-Regular, monospace;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 24px;
    font-family: var(--font-body);
    background: var(--canvas);
    color: var(--ink);
  }
  .card {
    width: 100%;
    max-width: 360px;
    background: var(--canvas-raised);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 24px;
    display: grid;
    gap: 16px;
  }
  .wordmark {
    display: flex;
    align-items: baseline;
    justify-content: center;
    gap: 8px;
    margin: 0;
    font: 600 24px var(--font-display);
    letter-spacing: 0.02em;
    color: var(--ink);
  }
  .wordmark .ah { font-weight: 700; color: var(--coyote); }
  form { display: grid; gap: 8px; margin: 0; }
  input[type="password"] {
    width: 100%;
    padding: 12px;
    font: 400 16px var(--font-body);
    color: var(--ink);
    background: var(--canvas);
    border: 1px solid var(--line);
    border-radius: 4px;
  }
  input[type="password"]::placeholder { color: var(--ink-faint); }
  input[type="password"]:focus { outline: 1px solid var(--coyote); outline-offset: -1px; }
  button {
    padding: 12px;
    font: 600 15px var(--font-display);
    letter-spacing: 0.04em;
    color: var(--canvas);
    background: var(--hivis);
    border: none;
    border-radius: 4px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  button:active { opacity: 0.7; }
  .error {
    margin: 0;
    text-align: center;
    font: 400 12px var(--font-mono);
    letter-spacing: 0.04em;
    color: var(--coyote);
  }
  .error::before { content: "ERR · "; font-weight: 500; }
  .setup { font-size: 14px; color: var(--ink-soft); line-height: 1.5; margin: 0; }
  .demo-link {
    text-align: center;
    font: 400 11px var(--font-mono);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-soft);
    text-decoration: none;
  }
  .demo-link:active { color: var(--ink); }
  pre {
    margin: 0;
    padding: 12px;
    font: 400 12px var(--font-mono);
    color: var(--ink-soft);
    background: var(--canvas);
    border: 1px solid var(--line);
    border-radius: 4px;
    overflow-x: auto;
  }
  .footnote {
    font: 400 10px var(--font-mono);
    letter-spacing: 0.1em;
    color: var(--ink-faint);
  }
</style>
</head>
<body>
  <div class="card">
    <h1 class="wordmark"><span class="ah">AH.</span><span>KNOCKBLOCK</span></h1>
    {% if setup_needed %}
    <p class="setup">No password has been set yet. On the Pi, run:</p>
    <pre>sudo ./venv/bin/python3 app.py --set-password</pre>
    <p class="setup">then reload this page.</p>
    {% else %}
    <form method="post">
      <input type="password" name="password" placeholder="Password" autofocus
             autocomplete="current-password" required>
      <button type="submit">UNLOCK</button>
      {% if error %}<p class="error">{{ error }}</p>{% endif %}
    </form>
    {% endif %}
    <a class="demo-link" href="/demo">Just browsing? Watch the live demo →</a>
  </div>
  <span class="footnote">RUNS FOREVER IF MAINTAINED</span>
</body>
</html>
